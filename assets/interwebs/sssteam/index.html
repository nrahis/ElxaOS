<head>
    <meta charset="UTF-8">
    <title>Sssteam - Game Store</title>
    <style>
        /* ===== SSSTEAM STORE — Steam-inspired dark theme ===== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        .sssteam-body {
            margin: 0 !important;
            padding: 0 !important;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif !important;
            background: #1b2838 !important;
            color: #c7d5e0 !important;
            font-size: 13px !important;
            line-height: 1.5 !important;
            min-height: 100vh !important;
            width: 100% !important;
        }

        .sssteam-body * { box-sizing: border-box; }

        .sssteam-root {
            background: #1b2838 !important;
            min-height: 100vh !important;
            width: 100% !important;
            color: #c7d5e0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            line-height: 1.5;
        }

        /* --- Top Navigation Bar --- */
        .sst-topbar {
            background: linear-gradient(to right, #171a21, #1b2838);
            border-bottom: 1px solid #0e1721;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .sst-topbar-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 44px;
        }
        .sst-logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            margin-right: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sst-logo-icon {
            font-size: 22px;
        }
        .sst-nav-links {
            display: flex;
            gap: 4px;
        }
        .sst-nav-link {
            color: #b8b6b4;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 2px;
            transition: color 0.15s, background 0.15s;
        }
        .sst-nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .sst-nav-link.active {
            color: #fff;
            background: rgba(103, 193, 245, 0.12);
        }

        /* --- Main Content Area --- */
        .sst-main {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* --- STORE VIEW --- */
        .sst-featured {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
            display: flex;
            min-height: 200px;
            cursor: pointer;
            transition: box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .sst-featured:hover {
            box-shadow: 0 0 20px rgba(103,193,245,0.15);
        }
        .sst-featured-img {
            width: 55%;
            background: linear-gradient(135deg, #2a475e, #1b2838);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            position: relative;
            overflow: hidden;
        }
        .sst-featured-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sst-featured-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .sst-featured-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 8px 0;
        }
        .sst-featured-desc {
            font-size: 12px;
            color: #8f98a0;
            margin: 0 0 12px 0;
            line-height: 1.5;
        }
        .sst-featured-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .sst-tag {
            background: rgba(103,193,245,0.12);
            color: #67c1f5;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 500;
        }
        .sst-featured-price {
            font-size: 16px;
            font-weight: 700;
        }

        /* --- Section Headers --- */
        .sst-section-header {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* --- Game Grid --- */
        .sst-game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }
        .sst-game-card {
            background: #2a475e;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .sst-game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .sst-card-img {
            height: 100px;
            background: linear-gradient(135deg, #1e3a5f, #16202c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            overflow: hidden;
        }
        .sst-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sst-card-body {
            padding: 10px 12px;
        }
        .sst-card-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sst-card-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .sst-card-tags .sst-tag { font-size: 9px; }
        .sst-card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sst-card-rating {
            font-size: 11px;
            color: #66c0f4;
        }
        .sst-price {
            font-weight: 700;
            color: #beee11;
            font-size: 13px;
        }
        .sst-price-free {
            color: #a4d007;
            font-weight: 700;
            font-size: 12px;
        }

        /* --- DETAIL VIEW --- */
        .sst-detail {
            display: none;
        }
        .sst-back-btn {
            background: none;
            border: none;
            color: #67c1f5;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            padding: 4px 0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sst-back-btn:hover { color: #fff; text-decoration: underline; }

        .sst-detail-header {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        .sst-detail-hero {
            width: 55%;
            border-radius: 4px;
            overflow: hidden;
            background: linear-gradient(135deg, #1e3a5f, #0d1b2a);
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
        }
        .sst-detail-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sst-detail-sidebar {
            flex: 1;
        }
        .sst-detail-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 8px 0;
        }
        .sst-detail-meta {
            font-size: 11px;
            color: #8f98a0;
            margin-bottom: 12px;
        }
        .sst-detail-meta span {
            display: block;
            margin-bottom: 3px;
        }
        .sst-detail-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .sst-detail-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }
        .sst-stars {
            color: #67c1f5;
            font-size: 14px;
        }
        .sst-rating-text {
            font-size: 12px;
            color: #8f98a0;
        }

        /* Buy box */
        .sst-buy-box {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 16px;
            margin-top: 8px;
        }
        .sst-buy-price {
            font-size: 22px;
            font-weight: 700;
            color: #beee11;
            margin-bottom: 10px;
        }
        .sst-buy-price.free { color: #a4d007; }
        .sst-buy-btn {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: filter 0.15s;
        }
        .sst-buy-btn:hover { filter: brightness(1.15); }
        .sst-buy-btn-purchase {
            background: linear-gradient(to right, #75b022, #588a1b);
            color: #d2efa9;
        }
        .sst-buy-btn-install {
            background: linear-gradient(to right, #4a9bd9, #2f7bbf);
            color: #d6f0ff;
        }
        .sst-buy-btn-installed {
            background: #3a5a3a;
            color: #8ab88a;
            cursor: default;
        }
        .sst-buy-btn-installed:hover { filter: none; }

        /* Description & Reviews */
        .sst-detail-body {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        .sst-detail-desc {
            background: rgba(0,0,0,0.15);
            border-radius: 4px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .sst-detail-desc h3 {
            font-size: 14px;
            color: #fff;
            margin: 0 0 10px 0;
        }
        .sst-detail-desc p {
            font-size: 12px;
            color: #acb2b8;
            margin: 0 0 10px 0;
            line-height: 1.6;
        }
        .sst-features-list {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
        }
        .sst-features-list li {
            font-size: 12px;
            color: #acb2b8;
            padding: 3px 0;
            padding-left: 16px;
            position: relative;
        }
        .sst-features-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #a4d007;
            font-weight: bold;
        }

        /* System Requirements panel */
        .sst-sysreq {
            background: rgba(0,0,0,0.15);
            border-radius: 4px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .sst-sysreq h3 {
            font-size: 14px;
            color: #fff;
            margin: 0 0 10px 0;
        }
        .sst-sysreq-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .sst-sysreq-label { color: #8f98a0; }
        .sst-sysreq-value { color: #c7d5e0; text-align: right; }

        /* Reviews section */
        .sst-reviews {
            margin-top: 24px;
        }
        .sst-review {
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 4px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .sst-review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .sst-review-author {
            font-size: 12px;
            font-weight: 600;
            color: #67c1f5;
        }
        .sst-review-rating {
            font-size: 11px;
            color: #67c1f5;
        }
        .sst-review-text {
            font-size: 12px;
            color: #acb2b8;
            line-height: 1.5;
        }
        .sst-review-helpful {
            font-size: 10px;
            color: #556772;
            margin-top: 6px;
        }

        /* --- LIBRARY VIEW --- */
        .sst-library { display: none; }
        .sst-library-empty {
            text-align: center;
            padding: 60px 20px;
            color: #556772;
        }
        .sst-library-empty-icon { font-size: 48px; margin-bottom: 12px; }

        .sst-library-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .sst-library-item:hover {
            background: rgba(103,193,245,0.08);
        }
        .sst-library-icon {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }
        .sst-library-info { flex: 1; }
        .sst-library-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .sst-library-status {
            font-size: 11px;
            color: #8f98a0;
        }
        .sst-library-status.installed { color: #a4d007; }
        .sst-library-status.not-installed { color: #8f98a0; }

        /* --- Screenshots section --- */
        .sst-screenshots {
            margin-top: 16px;
        }
        .sst-screenshots h3 {
            font-size: 14px;
            color: #fff;
            margin: 0 0 10px 0;
        }
        .sst-screenshot-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .sst-screenshot-thumb {
            width: 160px;
            height: 90px;
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
            background: #16202c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #556772;
        }
        .sst-screenshot-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Utility --- */
        .sst-hidden { display: none !important; }
    </style>
</head>
<body class="sssteam-body">
<div class="sssteam-root">

    <!-- ===== TOP NAV ===== -->
    <div class="sst-topbar">
        <div class="sst-topbar-inner">
            <div class="sst-logo" onclick="SssteamStore.showStore()">
                <span class="mdi mdi-controller-classic" style="font-size: 22px; color: #67c1f5;"></span> SSSTEAM
            </div>
            <div class="sst-nav-links">
                <a class="sst-nav-link active" data-view="store" onclick="SssteamStore.showStore()">Store</a>
                <a class="sst-nav-link" data-view="library" onclick="SssteamStore.showLibrary()">Library</a>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="sst-main">

        <!-- ===== STORE VIEW ===== -->
        <div class="sst-store" id="sstStoreView">
            <!-- Featured game (injected by JS) -->
            <div id="sstFeatured"></div>

            <!-- Free to Play -->
            <div class="sst-section-header">Free to Play</div>
            <div class="sst-game-grid" id="sstFreeGames"></div>

            <!-- Premium Games -->
            <div class="sst-section-header">Premium Games</div>
            <div class="sst-game-grid" id="sstPaidGames"></div>
        </div>

        <!-- ===== DETAIL VIEW ===== -->
        <div class="sst-detail" id="sstDetailView"></div>

        <!-- ===== LIBRARY VIEW ===== -->
        <div class="sst-library" id="sstLibraryView"></div>
    </div>

</div><!-- close sssteam-root -->

    // =======================================
    // SSSTEAM STORE APP
    // =======================================
    window.SssteamStore = {
        currentView: 'store',
        featuredGameId: 'sussy_cat',

        init() {
            this.renderStore();
        },

        // --- Navigation ---
        setActiveNav(view) {
            document.querySelectorAll('.sst-nav-link').forEach(link => {
                link.classList.toggle('active', link.dataset.view === view);
            });
            this.currentView = view;
        },

        showStore() {
            this.setActiveNav('store');
            document.getElementById('sstStoreView').style.display = 'block';
            document.getElementById('sstDetailView').style.display = 'none';
            document.getElementById('sstLibraryView').style.display = 'none';
        },

        showDetail(gameId) {
            this.setActiveNav('store');
            document.getElementById('sstStoreView').style.display = 'none';
            document.getElementById('sstDetailView').style.display = 'block';
            document.getElementById('sstLibraryView').style.display = 'none';
            this.renderDetail(gameId);
        },

        showLibrary() {
            this.setActiveNav('library');
            document.getElementById('sstStoreView').style.display = 'none';
            document.getElementById('sstDetailView').style.display = 'none';
            document.getElementById('sstLibraryView').style.display = 'block';
            this.renderLibrary();
        },

        // --- Helpers ---
        getGame(id) {
            return SSSTEAM_CATALOG.find(g => g.id === id);
        },

        renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5 ? 1 : 0;
            const empty = 5 - full - half;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
        },

        isInstalled(gameId) {
            try {
                const saved = localStorage.getItem('elxaOS-installed-programs');
                if (!saved) return false;
                const data = JSON.parse(saved);
                const game = this.getGame(gameId);
                if (!game) return false;
                // Check if any installed program has a matching game type
                return Object.values(data).some(p =>
                    p.gameData && p.gameData.type === game.installerData.gameData.type
                );
            } catch { return false; }
        },

        // --- Render Store ---
        renderStore() {
            // Featured game
            const featured = this.getGame(this.featuredGameId);
            const featuredEl = document.getElementById('sstFeatured');
            if (featured) {
                const heroContent = featured.heroImage
                    ? `<img src="${featured.heroImage}" alt="${featured.name}">`
                    : featured.icon;
                featuredEl.innerHTML = `
                    <div class="sst-featured" onclick="SssteamStore.showDetail('${featured.id}')">
                        <div class="sst-featured-img" style="background: linear-gradient(135deg, ${featured.heroColor}, #0d1b2a);">
                            ${heroContent}
                        </div>
                        <div class="sst-featured-info">
                            <div class="sst-featured-title">${featured.name}</div>
                            <div class="sst-featured-desc">${featured.shortDesc}</div>
                            <div class="sst-featured-tags">
                                ${featured.tags.map(t => `<span class="sst-tag">${t}</span>`).join('')}
                            </div>
                            <div class="sst-featured-price ${featured.price === 0 ? 'sst-price-free' : 'sst-price'}">${featured.priceDisplay}</div>
                        </div>
                    </div>
                `;
            }

            // Free games
            const freeGames = SSSTEAM_CATALOG.filter(g => g.price === 0);
            document.getElementById('sstFreeGames').innerHTML = freeGames.map(g => this.renderCard(g)).join('');

            // Paid games
            const paidGames = SSSTEAM_CATALOG.filter(g => g.price > 0);
            document.getElementById('sstPaidGames').innerHTML = paidGames.map(g => this.renderCard(g)).join('');
        },

        renderCard(game) {
            const heroContent = game.heroImage
                ? `<img src="${game.heroImage}" alt="${game.name}">`
                : game.icon;
            return `
                <div class="sst-game-card" onclick="SssteamStore.showDetail('${game.id}')">
                    <div class="sst-card-img" style="background: linear-gradient(135deg, ${game.heroColor}, #16202c);">
                        ${heroContent}
                    </div>
                    <div class="sst-card-body">
                        <div class="sst-card-title">${game.name}</div>
                        <div class="sst-card-tags">
                            ${game.tags.slice(0, 3).map(t => `<span class="sst-tag">${t}</span>`).join('')}
                        </div>
                        <div class="sst-card-bottom">
                            <span class="sst-card-rating">${this.renderStars(game.rating)} ${game.rating}</span>
                            <span class="${game.price === 0 ? 'sst-price-free' : 'sst-price'}">${game.priceDisplay}</span>
                        </div>
                    </div>
                </div>
            `;
        },

        // --- Render Detail ---
        renderDetail(gameId) {
            const game = this.getGame(gameId);
            if (!game) return;

            const installed = this.isInstalled(gameId);
            const heroContent = game.heroImage
                ? `<img src="${game.heroImage}" alt="${game.name}">`
                : game.icon;

            // Buy button
            let buyBtn;
            if (installed) {
                buyBtn = `<button class="sst-buy-btn sst-buy-btn-installed">✓ Installed</button>`;
            } else if (game.price === 0) {
                buyBtn = `<button class="sst-buy-btn sst-buy-btn-install" onclick="SssteamStore.installFree('${game.id}')">Install Game</button>`;
            } else {
                buyBtn = `<button class="sst-buy-btn sst-buy-btn-purchase" onclick="SssteamStore.buyGame('${game.id}')">Add to Cart — ${game.priceDisplay}</button>`;
            }

            // Screenshots
            let screenshotsHTML = '';
            if (game.screenshots && game.screenshots.length > 0) {
                screenshotsHTML = `
                    <div class="sst-screenshots">
                        <h3>Screenshots</h3>
                        <div class="sst-screenshot-grid">
                            ${game.screenshots.map(s => `
                                <div class="sst-screenshot-thumb">
                                    <img src="${s.src}" alt="${s.caption}" title="${s.caption}">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Reviews
            const reviewsHTML = game.reviews.map(r => `
                <div class="sst-review">
                    <div class="sst-review-header">
                        <span class="sst-review-author">${r.author}</span>
                        <span class="sst-review-rating">${this.renderStars(r.rating)}</span>
                    </div>
                    <div class="sst-review-text">${r.text}</div>
                    <div class="sst-review-helpful">${r.helpful} people found this helpful</div>
                </div>
            `).join('');

            document.getElementById('sstDetailView').innerHTML = `
                <button class="sst-back-btn" onclick="SssteamStore.showStore()">← Back to Store</button>

                <div class="sst-detail-header">
                    <div class="sst-detail-hero" style="background: linear-gradient(135deg, ${game.heroColor}, #0d1b2a);">
                        ${heroContent}
                    </div>
                    <div class="sst-detail-sidebar">
                        <div class="sst-detail-title">${game.name}</div>
                        <div class="sst-detail-meta">
                            <span>Developer: ${game.author}</span>
                            <span>Version: ${game.version}</span>
                        </div>
                        <div class="sst-detail-tags">
                            ${game.tags.map(t => `<span class="sst-tag">${t}</span>`).join('')}
                        </div>
                        <div class="sst-detail-rating">
                            <span class="sst-stars">${this.renderStars(game.rating)}</span>
                            <span class="sst-rating-text">${game.rating}/5 (${game.reviewCount.toLocaleString()} reviews)</span>
                        </div>
                        <div class="sst-buy-box">
                            <div class="sst-buy-price ${game.price === 0 ? 'free' : ''}">${game.priceDisplay}</div>
                            ${buyBtn}
                        </div>
                    </div>
                </div>

                ${screenshotsHTML}

                <div class="sst-detail-body">
                    <div>
                        <div class="sst-detail-desc">
                            <h3>About This Game</h3>
                            <p>${game.description}</p>
                            <h3>Features</h3>
                            <ul class="sst-features-list">
                                ${game.features.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="sst-reviews">
                            <div class="sst-section-header">User Reviews</div>
                            ${reviewsHTML}
                        </div>
                    </div>
                    <div class="sst-sysreq">
                        <h3>System Requirements</h3>
                        <div class="sst-sysreq-item">
                            <span class="sst-sysreq-label">OS</span>
                            <span class="sst-sysreq-value">${game.sysReqs.os}</span>
                        </div>
                        <div class="sst-sysreq-item">
                            <span class="sst-sysreq-label">Memory</span>
                            <span class="sst-sysreq-value">${game.sysReqs.ram}</span>
                        </div>
                        <div class="sst-sysreq-item">
                            <span class="sst-sysreq-label">Storage</span>
                            <span class="sst-sysreq-value">${game.sysReqs.disk}</span>
                        </div>
                        <div class="sst-sysreq-item">
                            <span class="sst-sysreq-label">Display</span>
                            <span class="sst-sysreq-value">${game.sysReqs.display}</span>
                        </div>
                    </div>
                </div>
            `;
        },

        // --- Actions ---
        buyGame(gameId) {
            const game = this.getGame(gameId);
            if (!game) return;

            purchaseProduct({
                name: game.name,
                price: game.priceDisplay,
                description: game.shortDesc,
                installerData: game.installerData
            });
        },

        installFree(gameId) {
            const game = this.getGame(gameId);
            if (!game) return;

            downloadFreeGame(game.installerData);

            // Refresh the detail view to show "Installed"
            setTimeout(() => {
                this.renderDetail(gameId);
            }, 500);
        },

        // --- Render Library ---
        renderLibrary() {
            const container = document.getElementById('sstLibraryView');
            let installedData = {};
            try {
                const saved = localStorage.getItem('elxaOS-installed-programs');
                if (saved) installedData = JSON.parse(saved);
            } catch {}

            // Build library: show all catalog games + mark installed status
            let html = `<div class="sst-section-header">My Games</div>`;

            const ownedGames = SSSTEAM_CATALOG.filter(g => this.isInstalled(g.id));
            const notOwned = SSSTEAM_CATALOG.filter(g => !this.isInstalled(g.id));

            if (ownedGames.length === 0) {
                html += `
                    <div class="sst-library-empty">
                        <div class="sst-library-empty-icon">📦</div>
                        <p>Your library is empty!</p>
                        <p>Visit the Store to find games.</p>
                    </div>
                `;
            } else {
                html += ownedGames.map(g => `
                    <div class="sst-library-item" onclick="SssteamStore.showDetail('${g.id}')">
                        <div class="sst-library-icon">${g.icon}</div>
                        <div class="sst-library-info">
                            <div class="sst-library-name">${g.name}</div>
                            <div class="sst-library-status installed">✓ Installed</div>
                        </div>
                    </div>
                `).join('');
            }

            if (notOwned.length > 0) {
                html += `<div class="sst-section-header" style="margin-top: 24px;">Not Installed</div>`;
                html += notOwned.map(g => `
                    <div class="sst-library-item" onclick="SssteamStore.showDetail('${g.id}')">
                        <div class="sst-library-icon" style="opacity: 0.4;">${g.icon}</div>
                        <div class="sst-library-info">
                            <div class="sst-library-name" style="color: #8f98a0;">${g.name}</div>
                            <div class="sst-library-status not-installed">${g.price === 0 ? 'Free to Play' : g.priceDisplay}</div>
                        </div>
                    </div>
                `).join('');
            }

            container.innerHTML = html;
        }
    };

    // Initialize on load
    window.SssteamStore.init();
    </script>
