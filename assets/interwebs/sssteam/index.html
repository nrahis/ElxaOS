<div class="sssteam-root">

    <!-- ===== TOP NAV ===== -->
    <div class="sst-topbar">
        <div class="sst-topbar-inner">
            <div class="sst-logo" onclick="SssteamStore.showStore()">
                <span class="mdi mdi-controller-classic" style="font-size: 22px; color: #67c1f5;"></span> SSSTEAM
            </div>
            <div class="sst-nav-links">
                <a class="sst-nav-link active" data-view="store" onclick="SssteamStore.showStore()">Store</a>
                <a class="sst-nav-link" data-view="library" onclick="SssteamStore.showLibrary()">Library</a>
            </div>
            <div class="sst-wallet" id="sstWallet" style="display: none;"></div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="sst-main">

        <!-- ===== STORE VIEW ===== -->
        <div class="sst-store" id="sstStoreView">
            <div id="sstFeatured"></div>

            <div class="sst-section-header">Free to Play</div>
            <div class="sst-game-grid" id="sstFreeGames"></div>

            <div class="sst-section-header">Premium Games</div>
            <div class="sst-game-grid" id="sstPaidGames"></div>
        </div>

        <!-- ===== DETAIL VIEW ===== -->
        <div class="sst-detail" id="sstDetailView"></div>

        <!-- ===== LIBRARY VIEW ===== -->
        <div class="sst-library" id="sstLibraryView"></div>
    </div>

</div>

<!-- Payment system (still used for paid game purchases) -->
<script src="../../../js/services/payment-system.js"></script>
<!-- Sssteam: catalog data, installer dialogs, store logic -->
<script src="sssteam-catalog.js"></script>
<script src="sssteam-installer.js"></script>
<script src="sssteam.js"></script>
