<!DOCTYPE html>
<html>
<head>
    <title>Abbit - The Front Page of Snakesia</title>
    <link rel="stylesheet" href="./assets/interwebs/abbit/styles.css">
</head>
<body>
    <div class="ab-container">
        <!-- Header -->
        <header class="ab-header">
            <div class="ab-header-content">
                <div class="ab-logo">
                    <span class="ab-logo-icon"><span class="mdi mdi-rabbit"></span></span>
                    <span class="ab-logo-text">abbit</span>
                </div>
                <div class="ab-search-bar">
                    <input type="text" placeholder="Search Abbit..." class="ab-search-input">
                </div>
                <div class="ab-user-menu">
                    <div class="ab-user-info">
                        <span class="ab-username">You</span>
                        <span class="ab-karma">👤 1 karma</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="ab-main-content">
            <!-- Sidebar -->
            <aside class="ab-sidebar">
                <div class="ab-subbabbit-list">
                    <div class="ab-sidebar-section">
                        <h3>Popular Communities</h3>
                        <div id="subrabbitsList">
                            <!-- Subbabbits will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Feed -->
            <main class="ab-feed">
                <div class="ab-feed-header">
                    <h2 id="feedTitle">Popular Posts</h2>
                    <div class="ab-sort-controls">
                        <select id="sortSelect" class="ab-sort-select">
                            <option value="hot">🔥 Hot</option>
                            <option value="new">🆕 New</option>
                            <option value="top">⭐ Top</option>
                        </select>
                    </div>
                </div>

                <!-- Compose prompt bar -->
                <div class="ab-compose-bar" id="composeBar">
                    <span class="ab-compose-avatar">👤</span>
                    <div class="ab-compose-prompt" id="composePrompt">Create a post</div>
                    <button class="ab-compose-btn ab-compose-image-btn" title="Image post" disabled><span class="mdi mdi-image elxa-icon-ui"></span></button>
                    <button class="ab-compose-btn ab-compose-link-btn" title="Link post" disabled><span class="mdi mdi-link-variant elxa-icon-ui"></span></button>
                </div>

                <div id="postsList" class="ab-posts-list">
                    <div class="ab-loading">Loading posts...</div>
                </div>
            </main>
        </div>

        <!-- Compose Modal -->
        <div id="composeModal" class="ab-modal" style="display: none;">
            <div class="ab-modal-content ab-compose-modal">
                <div class="ab-modal-header">
                    <h3 class="ab-compose-title">Create a post</h3>
                    <button id="closeCompose" class="ab-close-button"><span class="mdi mdi-close elxa-icon-ui"></span></button>
                </div>
                <div class="ab-compose-body">
                    <div class="ab-compose-field">
                        <label class="ab-compose-label">Community</label>
                        <select id="composeSubbabbit" class="ab-compose-select"></select>
                    </div>
                    <div class="ab-compose-field">
                        <label class="ab-compose-label">Title</label>
                        <input type="text" id="composePostTitle" class="ab-compose-input" placeholder="An interesting title" maxlength="200">
                        <span class="ab-compose-charcount"><span id="composeTitleCount">0</span>/200</span>
                    </div>
                    <div class="ab-compose-field">
                        <label class="ab-compose-label">Body <span class="ab-compose-optional">(optional)</span></label>
                        <textarea id="composePostBody" class="ab-compose-textarea" placeholder="Text (optional)" rows="6"></textarea>
                    </div>
                    <div class="ab-compose-footer">
                        <button id="composeCancel" class="ab-compose-cancel-btn">Cancel</button>
                        <button id="composeSubmit" class="ab-compose-submit-btn" disabled>Post</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Post Modal -->
        <div id="postModal" class="ab-modal" style="display: none;">
            <div class="ab-modal-content">
                <div class="ab-modal-header">
                    <button id="closeModal" class="ab-close-button"><span class="mdi mdi-close elxa-icon-ui"></span></button>
                </div>
                <div id="modalContent" class="ab-modal-body">
                    <!-- Post details and comments will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    <script src="./abbit.js"></script>
</body>
</html>
