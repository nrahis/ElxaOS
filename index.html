<body>
    <!-- Custom SVG Icon Sprites -->
    <div id="elxa-icon-sprites" style="display:none"></div>
    <!-- Desktop Environment -->
    <div class="desktop" id="desktop">
        <div class="desktop-wallpaper" id="wallpaper"></div>
        
        <!-- Desktop Icons -->
        <div class="desktop-icons" id="desktopIcons">
            <div class="desktop-icon" data-program="computer">
                <div class="desktop-icon-image"><svg class="elxa-icon-custom elxa-icon-desktop" viewBox="0 0 96 96"><use href="assets/icons/custom-icons.svg#icon-computer"/></svg></div>
                <div class="desktop-icon-label">My Computer</div>
            </div>
            <div class="desktop-icon" data-program="recycle-bin">
                <div class="desktop-icon-image"><svg class="elxa-icon-custom elxa-icon-desktop" viewBox="0 0 96 96"><use href="assets/icons/custom-icons.svg#icon-recycle-bin"/></svg></div>
                <div class="desktop-icon-label">Recycle Bin</div>
            </div>

            <div class="desktop-icon" data-program="notepad">
                <div class="desktop-icon-image"><svg class="elxa-icon-custom elxa-icon-desktop" viewBox="0 0 96 96"><use href="assets/icons/custom-icons.svg#icon-notepad"/></svg></div>
                <div class="desktop-icon-label">Notepad</div>
            </div>
            <div class="desktop-icon" data-program="elxasheets">
                <div class="desktop-icon-image"><svg class="elxa-icon-custom elxa-icon-desktop" viewBox="0 0 96 96"><use href="assets/icons/custom-icons.svg#icon-elxasheets"/></svg></div>
                <div class="desktop-icon-label">ElxaSheets</div>
            </div>
            <div class="desktop-icon" data-program="browser" data-launchargs="fsb.ex">
                <div class="desktop-icon-image"><span class="mdi mdi-bank elxa-icon-desktop" style="color: #2E7D32"></span></div>
                <div class="desktop-icon-label">First Snakesian Bank</div>
            </div>
        </div>

        <!-- Windows will be dynamically created here -->
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="start-button" id="startButton">
            <span class="mdi mdi-home elxa-icon-ui"></span> Start
        </div>
        <div class="quick-launch" id="quickLaunch">
            <div class="quick-launch-btn" id="quickLaunchExplorer" title="File Explorer"><span class="mdi mdi-folder elxa-icon-ui"></span></div>
        </div>
        <div class="taskbar-programs" id="taskbarPrograms">
            <!-- Active programs will appear here -->
        </div>
        <div class="taskbar-overflow-btn" id="taskbarOverflowBtn" title="More windows" style="display: none;">»</div>
        <div class="system-tray">
            <div class="tray-icon" id="antivirusIcon" title="ElxaGuard Antivirus"><span class="mdi mdi-shield-check elxa-icon-ui"></span></div>
            <div class="tray-icon" id="batteryIcon" title="Battery"><span class="mdi mdi-battery elxa-icon-ui"></span></div>
            <div class="tray-icon" id="wifiIcon" title="WiFi"><span class="mdi mdi-wifi elxa-icon-ui"></span></div>
            <div class="tray-icon" id="notificationIcon" title="Notifications"><span class="mdi mdi-bell-outline elxa-icon-ui"></span></div>
            <div class="clock" id="clock">00:00</div>
        </div>
    </div>

    <!-- Start Menu (dynamically populated by Taskbar) -->
    <div class="start-menu" id="startMenu"></div>
